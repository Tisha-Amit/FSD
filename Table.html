<!DOCTYPE html>
<html>
<head>
    <title>HTML5 Table Example with All Attributes</title>
</head>
<body>
<h2>HTML5 Table Example with All Attributes</h2>
<table border="1" cellpadding="10" cellspacing="0" width="80%" align="center">
    <caption>Student Report Table (Example of All Table Attributes)</caption>
    <thead>
        <tr>
            <th rowspan="2">Roll No</th>
            <th rowspan="2">Name</th>
            <th colspan="3">Marks</th>
            <th rowspan="2">Total</th>
        </tr>
        <tr>
            <th>Math</th>
            <th>Science</th>
            <th>English</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>101</td>
            <td>Amit</td>
            <td>88</td>
            <td>92</td>
            <td>85</td>
            <td>265</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Riya</td>
            <td>78</td>
            <td>80</td>
            <td>89</td>
            <td>247</td>
        </tr>
        <tr>
            <td>103</td>
            <td>Karan</td>
            <td colspan="2">Absent</td>
            <td>90</td>
            <td>-</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td colspan="6">End of Student Report</td>
        </tr>
    </tfoot>
</table>
</body>
</html>
